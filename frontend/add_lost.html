<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Report Lost Item</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">L&F System</a>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="add_lost.html">Report Lost</a>
    <a href="add_found.html">Report Found</a>
    <a href="claim.html">Claims</a>
  </div>
</nav>

<div class="page">
  <h1 class="page-title">Report Lost Item</h1>
  <p class="page-sub">Fill in the details of the item you lost.</p>

  <div id="alert" class="alert"></div>

  <div class="form-card">
    <!-- Step 1: add item -->
    <div class="form-group">
      <label>Item Name *</label>
      <input type="text" id="item-name" placeholder="e.g. Black Umbrella"/>
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" id="item-desc" placeholder="Brief description"/>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="item-cat">
        <option value="">— select —</option>
        <option>Electronics</option>
        <option>Clothing</option>
        <option>Accessories</option>
        <option>Documents</option>
        <option>Keys</option>
        <option>Wallet</option>
        <option>Books</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Your Name (Reported By) *</label>
      <select id="reported-by"></select>
    </div>

    <hr style="border-color:var(--border);margin:1.5rem 0"/>

    <!-- Step 2: lost report details -->
    <div class="form-group">
      <label>Where was it lost? *</label>
      <input type="text" id="lost-location" placeholder="e.g. Library, Cafeteria"/>
    </div>
    <div class="form-group">
      <label>Date Lost *</label>
      <input type="date" id="lost-date"/>
    </div>

    <button class="btn btn-primary" onclick="submitLostReport()">Submit Lost Report</button>
  </div>

  <!-- Recent lost reports -->
  <h2 style="font-size:1.3rem;font-weight:700;margin:3rem 0 1rem;">Recent Lost Reports</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>#</th><th>Item</th><th>Lost At</th><th>Date</th><th>Reported By</th></tr>
      </thead>
      <tbody id="lost-body">
        <tr><td colspan="5" class="loading">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="script.js"></script>
<script>
  populateUserSelect('reported-by')

  async function loadLostReports() {
    try {
      const data = await getJSON('/lost-reports')
      const tbody = document.getElementById('lost-body')
      if (!data.length) { tbody.innerHTML = '<tr><td colspan="5" class="loading">No lost reports yet.</td></tr>'; return }
      tbody.innerHTML = data.map(r => `
        <tr>
          <td>${r.lost_id}</td>
          <td>${r.item_name}</td>
          <td>${r.lost_location || '—'}</td>
          <td>${r.lost_date ? new Date(r.lost_date).toLocaleDateString() : '—'}</td>
          <td>${r.user_name}</td>
        </tr>`).join('')
    } catch (e) {
      document.getElementById('lost-body').innerHTML = '<tr><td colspan="5" class="loading">Backend not connected.</td></tr>'
    }
  }

  async function submitLostReport() {
    const name     = document.getElementById('item-name').value.trim()
    const desc     = document.getElementById('item-desc').value.trim()
    const category = document.getElementById('item-cat').value
    const reportedBy = document.getElementById('reported-by').value
    const location = document.getElementById('lost-location').value.trim()
    const date     = document.getElementById('lost-date').value

    if (!name || !reportedBy || !location || !date) {
      showAlert('alert', 'Please fill in all required fields.', 'error'); return
    }

    try {
      // 1. Add item
      const item = await postJSON('/items', { name, description: desc, category, status: 'lost', reported_by: reportedBy })
      // 2. File lost report
      await postJSON('/lost-reports', { item_id: item.item_id, user_id: reportedBy, lost_location: location, lost_date: date })
      showAlert('alert', `Lost report filed! Item ID: ${item.item_id}`, 'success')
      // Reset form
      ;['item-name','item-desc','lost-location','lost-date'].forEach(id => document.getElementById(id).value = '')
      loadLostReports()
    } catch (e) {
      showAlert('alert', 'Error: ' + e.message, 'error')
    }
  }

  loadLostReports()
</script>
</body>
</html>
